<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Admin - Moben Rent</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        navy: { 800: '#1e293b', 900: '#0f172a', DEFAULT: '#16213E' },
                        gold: { 400: '#fbbf24', 500: '#E8A33D', 600: '#d97706' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Loading Spinner */
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #16213E; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Modal Transition */
        .modal-overlay { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: scale(0.95) translateY(10px); }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
    </style>
</head>
<body class="text-slate-800 pb-24">

    <header class="bg-navy text-white sticky top-0 z-40 shadow-md">
        <div class="px-5 py-4 flex justify-between items-center">
            <h1 class="font-heading font-extrabold text-xl tracking-tight">Moben Rent</h1>
            <span class="bg-white/10 px-3 py-1 rounded-lg text-xs font-semibold backdrop-blur-sm" id="headerStatus">Panel Admin</span>
        </div>
    </header>

    <main id="loginView" class="p-5 max-w-md mx-auto mt-10">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="font-heading font-bold text-xl text-navy mb-2">Akses Keamanan</h2>
            <p class="text-sm text-slate-500 mb-6">Masukkan PIN admin Anda untuk masuk ke sistem.</p>
            
            <input type="password" id="pinInput" placeholder="Masukkan PIN" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gold-500 focus:bg-white transition-all mb-4 text-center tracking-widest text-lg font-bold">
            <button onclick="login()" class="w-full bg-navy text-white font-bold py-3.5 rounded-xl hover:bg-navy-900 transition-colors flex justify-center items-center gap-2">
                Masuk Dashboard
            </button>
        </div>
    </main>

    <main id="dashboardView" class="hidden max-w-lg mx-auto p-4">
        <!-- Tab: Menunggu Review -->
        <div id="tabPending" class="space-y-4"></div>
        
        <!-- Tab: Unit Aktif -->
        <div id="tabAktif" class="hidden space-y-4"></div>
    </main>

    <nav id="bottomNav" class="hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-40 pb-safe">
        <div class="flex justify-around items-center h-16">
            <button onclick="switchTab('pending')" id="btnTabPending" class="flex-1 flex flex-col items-center justify-center gap-1 text-navy">
                <svg class="w-6 h-6 transition-transform transform -translate-y-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 8v6M23 11h-6"/></svg>
                <span class="text-[10px] font-heading font-bold uppercase tracking-wide">Pendaftar</span>
            </button>
            <button onclick="switchTab('aktif')" id="btnTabAktif" class="flex-1 flex flex-col items-center justify-center gap-1 text-slate-400">
                <svg class="w-6 h-6 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[10px] font-heading font-bold uppercase tracking-wide">Unit Aktif</span>
            </button>
        </div>
    </nav>

    <div id="viewerModal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="modal-content bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden max-h-[90vh] flex flex-col relative">
            <!-- Modal Header -->
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                <h3 id="modalTitle" class="font-heading font-bold text-lg text-navy">Detail Pendaftar</h3>
                <button onclick="closeModal()" class="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-rose-100 hover:text-rose-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <!-- Modal Body (Scrollable) -->
            <div id="modalBody" class="p-5 overflow-y-auto bg-slate-50 hide-scrollbar flex-1">
                <!-- Dynamic Content Goes Here -->
            </div>
        </div>
    </div>

    <div id="dialogModal" class="modal-overlay fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
        <div class="modal-content bg-white w-full max-w-sm rounded-2xl shadow-xl overflow-hidden p-6 text-center">
            <div id="dialogIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-slate-100 text-slate-500">
                <!-- Icon injected via JS -->
            </div>
            <h3 id="dialogTitle" class="font-heading font-bold text-xl text-navy mb-2">Konfirmasi</h3>
            <p id="dialogMessage" class="text-sm text-slate-500 mb-6 line-clamp-3">Pesan konfirmasi disini.</p>
            
            <div id="dialogInputs" class="space-y-3 mb-6 hidden text-left">
                <!-- Inputs injected via JS -->
            </div>

            <div class="flex gap-3">
                <button id="dialogBtnCancel" onclick="closeDialog()" class="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">Batal</button>
                <button id="dialogBtnConfirm" class="flex-1 py-3 bg-navy text-white font-bold rounded-xl hover:bg-navy-900 transition-colors">Konfirmasi</button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        // GANTI URL DI BAWAH INI DENGAN LINK WEB APP ADMIN ANDA
        const GAS_ADMIN_URL = "https://script.google.com/macros/s/AKfycbwoeZkaW5JepuBZdaft9MChcqEFRLih1hNXyl2wNh62J9YTUtyLUUFnDd2OB78UbUEX0g/exec";
        
        let sessionPin = "";
        let applicationData = []; // Store fetched data

        // --- HELPER FUNCTIONS ---
        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
        
        // Convert Google Drive view URL to direct image URL for embedding
        const getDirectImageUrl = (url) => {
            if(!url) return null;
            const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if(match && match[1]) {
                return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            return url;
        };

        // Custom UI Alert / Prompt Dialog System
        let dialogConfirmCallback = null;

        function showUIBox(options) {
            const modal = document.getElementById('dialogModal');
            document.getElementById('dialogTitle').innerText = options.title || 'Informasi';
            document.getElementById('dialogMessage').innerText = options.message || '';
            
            // Setup Icon
            const iconContainer = document.getElementById('dialogIcon');
            if(options.type === 'success') {
                iconContainer.className = 'w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-emerald-100 text-emerald-500';
                iconContainer.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else if(options.type === 'error') {
                iconContainer.className = 'w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-rose-100 text-rose-500';
                iconContainer.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            } else if(options.type === 'warning') {
                iconContainer.className = 'w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-amber-100 text-amber-500';
                iconContainer.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                iconContainer.className = 'w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 bg-indigo-100 text-indigo-500';
                iconContainer.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            // Setup Inputs
            const inputContainer = document.getElementById('dialogInputs');
            inputContainer.innerHTML = '';
            if(options.inputs && options.inputs.length > 0) {
                inputContainer.classList.remove('hidden');
                options.inputs.forEach((inp, idx) => {
                    inputContainer.innerHTML += `
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">${inp.label}</label>
                            <input type="${inp.type || 'text'}" id="dialogInp_${idx}" placeholder="${inp.placeholder || ''}" value="${inp.value || ''}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-navy focus:bg-white transition-all text-sm font-medium">
                        </div>
                    `;
                });
            } else {
                inputContainer.classList.add('hidden');
            }

            // Setup Buttons
            const btnConfirm = document.getElementById('dialogBtnConfirm');
            const btnCancel = document.getElementById('dialogBtnCancel');
            
            btnConfirm.innerText = options.confirmText || 'OK';
            btnConfirm.className = `flex-1 py-3 font-bold rounded-xl text-white transition-colors ${options.confirmColor || 'bg-navy hover:bg-navy-900'}`;
            
            if(options.showCancel) {
                btnCancel.style.display = 'block';
                btnConfirm.classList.remove('w-full');
            } else {
                btnCancel.style.display = 'none';
                btnConfirm.classList.add('w-full');
            }

            dialogConfirmCallback = () => {
                let results = [];
                if(options.inputs) {
                    options.inputs.forEach((_, idx) => {
                        results.push(document.getElementById(`dialogInp_${idx}`).value);
                    });
                }
                closeDialog();
                if(options.onConfirm) options.onConfirm(results);
            };
            
            btnConfirm.onclick = dialogConfirmCallback;
            modal.classList.add('active');
        }

        function closeDialog() {
            document.getElementById('dialogModal').classList.remove('active');
        }


        // --- MAIN LOGIC ---

        function login() {
            const pin = document.getElementById('pinInput').value;
            if(!pin) return showUIBox({type: 'error', title: 'Akses Ditolak', message: 'Silakan masukkan PIN'});
            
            sessionPin = pin;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'block';
            document.getElementById('bottomNav').style.display = 'block';
            loadData();
        }

        function switchTab(tab) {
            const btnPending = document.getElementById('btnTabPending');
            const btnAktif = document.getElementById('btnTabAktif');
            const viewPending = document.getElementById('tabPending');
            const viewAktif = document.getElementById('tabAktif');

            // Reset
            btnPending.classList.replace('text-navy', 'text-slate-400');
            btnPending.querySelector('svg').classList.remove('-translate-y-1');
            btnAktif.classList.replace('text-navy', 'text-slate-400');
            btnAktif.querySelector('svg').classList.remove('-translate-y-1');
            viewPending.classList.add('hidden');
            viewAktif.classList.add('hidden');

            if (tab === 'pending') {
                btnPending.classList.replace('text-slate-400', 'text-navy');
                btnPending.querySelector('svg').classList.add('-translate-y-1');
                viewPending.classList.remove('hidden');
            } else {
                btnAktif.classList.replace('text-slate-400', 'text-navy');
                btnAktif.querySelector('svg').classList.add('-translate-y-1');
                viewAktif.classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loadData() {
            const viewPending = document.getElementById('tabPending');
            const viewAktif = document.getElementById('tabAktif');
            
            const loaderHTML = `<div class="flex flex-col items-center justify-center py-12 text-slate-400"><div class="loader mb-4"></div><p class="text-sm font-medium">Mensinkronisasi Data...</p></div>`;
            viewPending.innerHTML = loaderHTML;
            viewAktif.innerHTML = loaderHTML;
            
            fetch(`${GAS_ADMIN_URL}?pin=${sessionPin}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === "error") {
                        showUIBox({type: 'error', title: 'Gagal Login', message: data.message});
                        document.getElementById('loginView').style.display = 'block'; 
                        document.getElementById('dashboardView').style.display = 'none';
                        document.getElementById('bottomNav').style.display = 'none';
                        return;
                    }
                    
                    applicationData = data.data; // Store globally for modal access
                    renderDashboard(applicationData);
                })
                .catch(err => {
                    showUIBox({type: 'error', title: 'Koneksi Gagal', message: 'Gagal terhubung ke database.'});
                });
        }

        function renderDashboard(dataArray) {
            const viewPending = document.getElementById('tabPending');
            const viewAktif = document.getElementById('tabAktif');
            
            viewPending.innerHTML = '';
            viewAktif.innerHTML = '';
            
            let countPending = 0, countAktif = 0;

            dataArray.forEach((item, index) => {
                const waLink = `https://wa.me/62${item.noWa.replace(/^0+/, '').replace(/\D/g,'')}`;

                if (item.status === "PENDING") {
                    countPending++;
                    const isSuspicious = item.keamanan.includes("MENCURIGAKAN");
                    const secBadgeColor = isSuspicious ? 'bg-red-50 text-red-700 border-red-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200';
                    const secBorder = isSuspicious ? 'border-l-4 border-l-red-500' : '';

                    viewPending.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 relative overflow-hidden ${secBorder}">
                        <div class="flex justify-between items-start mb-1">
                            <span class="inline-block px-3 py-1 bg-amber-100 text-amber-700 text-[10px] font-extrabold tracking-wider rounded-full uppercase">MENUNGGU REVIEW</span>
                            <span class="text-xs text-slate-400 font-medium">${new Date(item.timestamp).toLocaleDateString('id-ID')}</span>
                        </div>
                        <h3 class="font-heading text-xl font-bold text-navy mb-3">${item.nama}</h3>
                        
                        <div class="text-xs ${secBadgeColor} border px-3 py-2 rounded-xl font-semibold flex items-center gap-2 mb-4 leading-tight">
                            📍 ${item.keamanan}
                        </div>
                        
                        <!-- Panel Review Buttons -->
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            <button onclick="openModal('ktp', ${index})" class="py-2.5 bg-slate-50 hover:bg-slate-100 rounded-xl text-xs font-bold text-slate-600 flex flex-col items-center gap-1 border border-slate-200 transition-colors">
                                <span class="text-lg">📄</span> KTP
                            </button>
                            <button onclick="openModal('selfie', ${index})" class="py-2.5 bg-slate-50 hover:bg-slate-100 rounded-xl text-xs font-bold text-slate-600 flex flex-col items-center gap-1 border border-slate-200 transition-colors">
                                <span class="text-lg">👤</span> Selfie
                            </button>
                            <button onclick="openModal('berkas', ${index})" class="py-2.5 bg-indigo-50 hover:bg-indigo-100 rounded-xl text-xs font-bold text-indigo-600 flex flex-col items-center gap-1 border border-indigo-200 transition-colors">
                                <span class="text-lg">📁</span> Identitas
                            </button>
                        </div>
                        
                        <div class="flex gap-2">
                            <button onclick="aksiAcc(${item.row}, '${item.nama}')" class="flex-1 bg-emerald-500 text-white py-3.5 rounded-xl font-bold font-heading text-sm hover:bg-emerald-600 transition-colors shadow-sm shadow-emerald-500/30">ACC Sewa</button>
                            <button onclick="aksiBase(${item.row}, '${item.nama}', 'TOLAK')" class="flex-1 bg-rose-50 text-rose-600 border border-rose-200 py-3.5 rounded-xl font-bold font-heading text-sm hover:bg-rose-100 transition-colors">Tolak</button>
                        </div>
                    </div>`;
                } 
                else if (item.status === "AKTIF") {
                    countAktif++;
                    const isAman = item.saldo >= 0;
                    const badgeClass = isAman ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-red-50 border-red-200 text-red-700 shadow-[0_0_0_2px_rgba(239,68,68,0.2)] animate-pulse';
                    const badgeIcon = isAman ? '🟢 AMAN' : '🔴 NUNGGAK';

                    viewAktif.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-heading text-lg font-bold text-navy">${item.nama}</h3>
                            <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg font-bold text-sm border border-slate-200 tracking-wide">${item.plat}</span>
                        </div>
                        
                        <div class="${badgeClass} border px-3 py-2 rounded-xl font-bold text-sm mb-4 text-center">
                            ${badgeIcon} (Saldo: ${formatRp(item.saldo)})
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 mb-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-0.5">Hari Sewa Ke-</span>
                                <span class="block font-bold text-navy">${item.hariSewa} Hari</span>
                            </div>
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-0.5">Total Tagihan</span>
                                <span class="block font-bold text-navy">${formatRp(item.tagihan)}</span>
                            </div>
                            <div class="col-span-2 pt-2 mt-2 border-t border-slate-200">
                                <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-0.5">Total Uang Masuk</span>
                                <span class="block font-extrabold text-emerald-600 text-lg">${formatRp(item.uangMasuk)}</span>
                            </div>
                        </div>

                        <button onclick="aksiBayar(${item.row}, '${item.nama}')" class="w-full bg-gold-500 text-white font-bold py-3.5 rounded-xl text-sm hover:bg-gold-600 transition-colors shadow-sm shadow-gold-500/30 mb-3 flex justify-center items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            Input Uang Harian
                        </button>
                        
                        <div class="flex gap-2">
                            <a href="${waLink}" target="_blank" class="flex-1 bg-[#25D366] text-white py-3 rounded-xl font-bold text-sm text-center flex items-center justify-center gap-2 transition-transform active:scale-95">
                                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.015c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                                WA
                            </a>
                            <button onclick="aksiBase(${item.row}, '${item.nama}', 'SELESAI')" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-sm hover:bg-slate-200 transition-colors">Selesai</button>
                        </div>
                    </div>`;
                }
            });
            
            if(countPending === 0) viewPending.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl border border-slate-100 border-dashed text-slate-400 font-medium">✨ Tidak ada antrean pendaftar baru.</div>`;
            if(countAktif === 0) viewAktif.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl border border-slate-100 border-dashed text-slate-400 font-medium">🏍️ Tidak ada motor yang sedang disewa.</div>`;
        }


        function openModal(type, index) {
            const data = applicationData[index];
            const modal = document.getElementById('viewerModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = ''; // Clear previous

            if (type === 'ktp' || type === 'selfie') {
                modalTitle.innerText = type === 'ktp' ? 'Pratinjau Foto KTP' : 'Pratinjau Foto Selfie';
                const sourceUrl = type === 'ktp' ? data.fotoKtp : data.fotoSelfie;
                const directUrl = getDirectImageUrl(sourceUrl);
                
                if(directUrl) {
                    modalBody.innerHTML = `
                        <div class="flex flex-col items-center">
                            <div class="w-full bg-slate-200 rounded-xl overflow-hidden min-h-[200px] flex items-center justify-center relative shadow-inner">
                                <div class="absolute text-slate-400 text-sm font-medium z-0 flex flex-col items-center gap-2"><div class="loader"></div>Memuat Gambar...</div>
                                <img src="${directUrl}" class="w-full h-auto relative z-10" onload="this.previousElementSibling.style.display='none'" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'p-6 text-center text-rose-500 font-bold\\'>⚠️ Gambar tidak dapat dimuat langsung karena pembatasan izin Google Drive.</div>';">
                            </div>
                            <a href="${sourceUrl}" target="_blank" class="mt-4 w-full bg-navy text-white text-center py-3 rounded-xl font-bold hover:bg-navy-900 shadow-md">🔗 Buka Gambar Asli di Tab Baru</a>
                        </div>
                    `;
                } else {
                    modalBody.innerHTML = `<div class="p-4 text-center text-slate-500">Link foto tidak valid atau tidak tersedia.</div>`;
                }
            } 
            else if (type === 'berkas') {
                modalTitle.innerText = `Data Lengkap: ${data.nama.split(' ')[0]}`;
                
                // Cek apakah data lengkap (NIK dll) tersedia dari backend
                const isDataLengkap = !!data.nikPenyewa;
                
                let contentHTML = '';

                if(!isDataLengkap) {
                    contentHTML += `
                    <div class="bg-amber-50 border border-amber-200 text-amber-700 p-3 rounded-xl text-xs font-semibold mb-4 flex gap-2">
                        <span>⚠️</span>
                        <span>Backend belum diupdate. Menampilkan data terbatas. Silakan update file Google Apps Script Admin agar NIK & detail lain muncul disini.</span>
                    </div>`;
                }

                const DataRow = (label, value, isBold=false) => `
                    <div class="flex flex-col py-2 border-b border-slate-100 last:border-0">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">${label}</span>
                        <span class="text-sm ${isBold ? 'font-bold text-navy' : 'font-medium text-slate-700'}">${value || '-'}</span>
                    </div>
                `;

                const PhotoBtn = (label, url) => url ? `
                    <a href="${url}" target="_blank" class="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-xl hover:border-gold-500 transition-colors shadow-sm">
                        <span class="text-sm font-bold text-slate-700 flex items-center gap-2">📷 ${label}</span>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                ` : '';

                contentHTML += `
                    <div class="space-y-4">
                        <!-- Identitas Diri -->
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-heading font-bold text-navy mb-2 flex items-center gap-2"><span class="text-gold-500">1.</span> Identitas Diri</h4>
                            ${DataRow('Nama Lengkap', data.nama, true)}
                            ${DataRow('Nomor WhatsApp', data.noWa)}
                            ${isDataLengkap ? DataRow('NIK KTP Penyewa', data.nikPenyewa, true) : ''}
                            ${isDataLengkap ? DataRow('NIK KTP Istri', data.nikIstri) : ''}
                            ${isDataLengkap ? DataRow('Nomor KK', data.noKk) : ''}
                        </div>

                        <!-- Info Kontak & Lokasi -->
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-heading font-bold text-navy mb-2 flex items-center gap-2"><span class="text-gold-500">2.</span> Info & Lokasi</h4>
                            ${isDataLengkap ? DataRow('Email', data.email) : ''}
                            ${isDataLengkap ? DataRow('Sosial Media', data.sosmed) : ''}
                            ${isDataLengkap ? DataRow('Kontak Darurat', data.kontakDarurat, true) : ''}
                            
                            <div class="mt-3">
                                <a href="${data.mapsUrl}" target="_blank" class="w-full bg-blue-50 text-blue-600 font-bold py-2.5 rounded-xl text-center text-sm flex items-center justify-center gap-2 border border-blue-100 hover:bg-blue-100">
                                    🗺️ Buka Koordinat Maps
                                </a>
                            </div>
                        </div>

                        <!-- Berkas Foto -->
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <h4 class="font-heading font-bold text-navy mb-3 flex items-center gap-2"><span class="text-gold-500">3.</span> Dokumen Penunjang</h4>
                            <div class="space-y-2">
                                ${PhotoBtn('KTP Penyewa', data.fotoKtp)}
                                ${PhotoBtn('Selfie Depan Rumah', data.fotoSelfie)}
                                ${isDataLengkap ? PhotoBtn('KTP Istri', data.fotoKtpIstri) : ''}
                                ${isDataLengkap ? PhotoBtn('Kartu Keluarga (KK)', data.fotoKk) : ''}
                                ${isDataLengkap ? PhotoBtn('KTP Penjamin', data.fotoPenjamin) : ''}
                                ${isDataLengkap ? PhotoBtn('Foto Rumah (2 Meter)', data.fotoRumah2m) : ''}
                                ${isDataLengkap ? PhotoBtn('SS Akun Ojol', data.ssAkun) : ''}
                            </div>
                            
                            <div class="mt-4 pt-4 border-t border-slate-100">
                                <a href="${data.folderUrl}" target="_blank" class="w-full bg-navy text-white font-bold py-3 rounded-xl text-center text-sm flex items-center justify-center gap-2 shadow-md hover:bg-navy-900 transition-colors">
                                    📁 Buka Folder Utama Drive
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                
                modalBody.innerHTML = contentHTML;
            }

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('viewerModal').classList.remove('active');
        }

        function aksiAcc(row, nama) {
            showUIBox({
                type: 'info',
                title: 'Setujui Penyewa',
                message: `Masukkan detail penyewaan untuk ${nama}.`,
                showCancel: true,
                confirmText: 'Proses ACC',
                inputs: [
                    { label: 'Plat Motor & Jenis', placeholder: 'Contoh: B 1234 XYZ - Vario' },
                    { label: 'Uang Awal / DP (Rp)', type: 'number', placeholder: 'Contoh: 50000', value: '50000' }
                ],
                onConfirm: (vals) => {
                    if(!vals[0]) return showUIBox({type:'warning', title:'Batal', message:'Plat motor wajib diisi.'});
                    if(!vals[1]) return showUIBox({type:'warning', title:'Batal', message:'DP wajib diisi.'});
                    kirimData({pin: sessionPin, action: 'ACC', row: row, plat: vals[0], dp: vals[1]});
                }
            });
        }

        function aksiBayar(row, nama) {
            showUIBox({
                type: 'info',
                title: 'Input Setoran',
                message: `Masukkan nominal uang harian dari ${nama}.`,
                showCancel: true,
                confirmText: 'Simpan',
                inputs: [
                    { label: 'Nominal (Rp)', type: 'number', placeholder: 'Contoh: 40000' }
                ],
                onConfirm: (vals) => {
                    if(!vals[0] || isNaN(vals[0])) return showUIBox({type:'warning', title:'Batal', message:'Nominal tidak valid.'});
                    kirimData({pin: sessionPin, action: 'BAYAR', row: row, nominal: vals[0]});
                }
            });
        }

        function aksiBase(row, nama, act) {
            const actionText = act === 'TOLAK' ? 'Menolak' : 'Menyelesaikan sewa';
            const color = act === 'TOLAK' ? 'bg-rose-500 hover:bg-rose-600' : 'bg-navy hover:bg-navy-900';
            
            showUIBox({
                type: act === 'TOLAK' ? 'warning' : 'info',
                title: 'Konfirmasi Aksi',
                message: `Yakin ingin ${actionText} untuk ${nama}?`,
                showCancel: true,
                confirmText: act === 'TOLAK' ? 'Ya, Tolak' : 'Ya, Selesai',
                confirmColor: color,
                onConfirm: () => {
                    kirimData({pin: sessionPin, action: act, row: row});
                }
            });
        }

        function kirimData(payload) {
            // Tampilkan loading toast/overlay jika diperlukan
            showUIBox({title: 'Memproses...', message: 'Mohon tunggu sebentar...', showCancel: false, confirmText: '...'});
            document.getElementById('dialogBtnConfirm').disabled = true;

            fetch(GAS_ADMIN_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(res => {
                closeDialog();
                if(res.status === 'success') {
                    showUIBox({type: 'success', title: 'Berhasil', message: res.message, confirmText: 'OK', onConfirm: () => loadData()});
                } else {
                    showUIBox({type: 'error', title: 'Gagal', message: res.message});
                }
            })
            .catch(err => {
                closeDialog();
                showUIBox({type: 'error', title: 'Koneksi Gagal', message: 'Gagal memproses data.'});
            });
        }
    </script>
</body>
</html>
