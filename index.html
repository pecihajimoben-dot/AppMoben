<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Moben Rent</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; padding: 15px; margin: 0; }
        .header { text-align: center; background: #007bff; color: white; padding: 15px; border-radius: 0 0 10px 10px; margin-bottom: 20px;}
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc;}
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-acc { background: #28a745; width: 48%; display: inline-block; }
        .btn-tolak { background: #dc3545; width: 48%; display: inline-block; float: right;}
        .fraud { border-left: 5px solid #dc3545; background: #fdf2f2; }
        .link-btn { display: inline-block; padding: 5px; background: #ddd; color: black; text-decoration: none; font-size: 12px; margin: 2px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="header"><h2>Moben Control Panel</h2></div>

<div id="loginBox" class="card">
    <label>PIN Admin:</label><input type="password" id="pinInput">
    <button onclick="login()">Masuk</button>
</div>

<div id="dashboard">
    <div class="card">
        <label>Filter 16 Wilayah:</label>
        <select id="regionFilter" onchange="loadData()">
            <option value="Kota Bekasi">Kota Bekasi</option>
            <option value="Kabupaten Bekasi">Kabupaten Bekasi</option>
        </select>
    </div>
    <div id="dataContainer"></div>
</div>

<script>
    const GAS_ADMIN_URL = "https://script.google.com/macros/s/AKfycbwoeZkaW5JepuBZdaft9MChcqEFRLih1hNXyl2wNh62J9YTUtyLUUFnDd2OB78UbUEX0g/exec";
    let pin = "";

    function login() { pin = document.getElementById('pinInput').value; document.getElementById('loginBox').style.display='none'; document.getElementById('dashboard').style.display='block'; loadData(); }

    function loadData() {
        const r = document.getElementById('regionFilter').value;
        const c = document.getElementById('dataContainer');
        c.innerHTML = "Memuat...";
        fetch(`${GAS_ADMIN_URL}?pin=${pin}&region=${r}`).then(res=>res.json()).then(data => {
            if(data.status === "error") return alert(data.message);
            c.innerHTML = "";
            data.data.forEach(i => {
                let fraudCls = i.keamanan.includes("MENCURIGAKAN") ? "fraud" : "";
                c.innerHTML += `
                <div class="card ${fraudCls}">
                    <h3>${i.nama}</h3>
                    <p style="font-size:12px"><b>Status:</b> ${i.status} <br><b>Keamanan:</b> ${i.keamanan}</p>
                    <a href="${i.fotoKtp}" class="link-btn" target="_blank">KTP</a>
                    <a href="${i.fotoSelfie}" class="link-btn" target="_blank">Selfie</a>
                    <a href="${i.mapsUrl}" class="link-btn" target="_blank">Maps</a>
                    <div style="margin-top:10px;">
                        <button class="btn-acc" onclick="aksi(${i.row},'${i.nama}','ACC')">ACC</button>
                        <button class="btn-tolak" onclick="aksi(${i.row},'${i.nama}','Tolak')">Tolak</button>
                    </div>
                </div>`;
            });
        });
    }

    function aksi(row, nama, act) {
        if(!confirm(act + " " + nama + "?")) return;
        fetch(GAS_ADMIN_URL, {method:'POST', body:JSON.stringify({pin:pin, region:document.getElementById('regionFilter').value, row:row, nama:nama, action:act})})
        .then(r=>r.json()).then(res=>{ alert(res.message); loadData(); });
    }
</script>
</body>
</html>
